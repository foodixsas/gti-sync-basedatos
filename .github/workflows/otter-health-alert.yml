name: Otter health alert

# Monitorea el polling Otter cada 10 min. Si lleva más de 30 min sin inserts,
# manda WhatsApp a Daniel via Twilio. Dedupe por cooldown (1h) para no spammear.
#
# Secrets requeridos (en repo settings → Actions secrets):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_WHATSAPP_FROM
#   ALERT_WHATSAPP_TO  (ej "whatsapp:+5939XXXXXXXX")

on:
  schedule:
    - cron: '*/10 * * * *' # cada 10 min
  workflow_dispatch:
    inputs:
      send_test:
        description: 'Mandar WhatsApp de prueba (ignora validaciones, dispara mensaje directo)'
        type: boolean
        required: false
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install minimal deps
        run: npm install --no-fund --no-audit @supabase/supabase-js tsx

      - name: Run alert check
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWILIO_ACCOUNT_SID:        ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:         ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:      ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_TEMPLATE_SID:       ${{ secrets.TWILIO_TEMPLATE_SID }}
          ALERT_WHATSAPP_TO:         ${{ secrets.ALERT_WHATSAPP_TO }}
          SEND_TEST:                 ${{ inputs.send_test || 'false' }}
        run: npx tsx src/scripts/check-otter-alert.ts
