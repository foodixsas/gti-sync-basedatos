name: Scrape Costos - Cierre Mensual

# Runs on the 2nd of each month at 5am Ecuador (10am UTC)
# Re-scrapes the PREVIOUS month to catch any corrections made after daily scrapes

on:
  schedule:
    - cron: '0 10 2 * *'  # Día 2 de cada mes, 10am UTC (5am Ecuador)
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mes a cerrar (MM/YYYY) — default: mes anterior'
        required: false

jobs:
  cierre:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper - Cierre mensual
        env:
          CONTIFICO_EMAIL: ${{ secrets.CONTIFICO_EMAIL }}
          CONTIFICO_PASSWORD: ${{ secrets.CONTIFICO_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ inputs.mes }}" ]; then
            MES="${{ inputs.mes }}"
          else
            # Previous month: subtract 1 month from current date
            MES=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +"%m/%Y" 2>/dev/null \
              || date -u -v-1m +"%m/%Y")
          fi
          echo "📅 Cierre mensual: $MES"
          npx tsx src/scripts/scrape-costos.ts --desde $MES --hasta $MES --tipo cierre_mensual
